apiVersion: 1

contactPoints:
  - orgId: 1
    name: Slack
    receivers:
      - uid: slack-nexus
        type: slack
        settings:
          url: ${SLACK_WEBHOOK_URL}
          title: "{{ .CommonAnnotations.summary }}"
          text: "{{ range .Alerts }}{{ .Annotations.description }}\n{{ end }}"
          username: "Nexus Alerts"
          icon_emoji: ":bell:"
        disableResolveMessage: false
