apiVersion: 1

groups:
  - orgId: 1
    name: nexus-loki-alerts
    folder: Nexus
    interval: 1m
    rules:
      - uid: nexus-error-spike
        title: "Error Spike"
        condition: B
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: loki-nexus
            model:
              expr: 'sum(count_over_time({service=~"nexus-backend|nexus-mcp", level=~"ERROR|error|CRITICAL|critical"} [5m]))'
              queryType: range
              refId: A
          - refId: B
            datasourceUid: "-100"
            model:
              type: classic_conditions
              refId: B
              conditions:
                - type: query
                  evaluator: { type: gt, params: [10] }
                  operator: { type: and }
                  query: { params: [A] }
                  reducer: { type: last, params: [] }
        noDataState: OK
        execErrState: Error
        for: 2m
        annotations:
          summary: "High error rate on Nexus"
          description: "More than 10 ERROR/CRITICAL logs in the last 5 minutes."
        labels:
          severity: critical

      - uid: nexus-service-silent
        title: "Service Silent"
        condition: B
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: loki-nexus
            model:
              expr: 'sum by (service) (count_over_time({service=~"nexus-backend|nexus-mcp"} [5m]))'
              queryType: range
              refId: A
          - refId: B
            datasourceUid: "-100"
            model:
              type: classic_conditions
              refId: B
              conditions:
                - type: query
                  evaluator: { type: lt, params: [1] }
                  operator: { type: and }
                  query: { params: [A] }
                  reducer: { type: last, params: [] }
        noDataState: Alerting
        execErrState: Error
        for: 5m
        annotations:
          summary: "Service producing no logs"
          description: "A service has emitted no logs for 5+ minutes — may be crashed or hung."
        labels:
          severity: warning

      - uid: nexus-health-monitor-down
        title: "Dependency Down"
        condition: B
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: loki-nexus
            model:
              expr: 'count_over_time({service="nexus-backend", logger="backend_proxy.health_monitor"} |= "DOWN" [5m])'
              queryType: range
              refId: A
          - refId: B
            datasourceUid: "-100"
            model:
              type: classic_conditions
              refId: B
              conditions:
                - type: query
                  evaluator: { type: gt, params: [0] }
                  operator: { type: and }
                  query: { params: [A] }
                  reducer: { type: last, params: [] }
        noDataState: OK
        execErrState: Error
        for: 0m
        annotations:
          summary: "External dependency is DOWN"
          description: "Health monitor detected a dependency failure (LLM API, Redis, SQL Server, or MCP Server)."
        labels:
          severity: critical

  - orgId: 1
    name: nexus-prometheus-alerts
    folder: Nexus
    interval: 1m
    rules:
      - uid: nexus-high-latency
        title: "High P95 Latency"
        condition: B
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus-nexus
            model:
              expr: 'histogram_quantile(0.95, sum by (le) (rate(http_request_duration_seconds_bucket{job="backend_proxy"}[5m]))) * 1000'
              refId: A
          - refId: B
            datasourceUid: "-100"
            model:
              type: classic_conditions
              refId: B
              conditions:
                - type: query
                  evaluator: { type: gt, params: [3000] }
                  operator: { type: and }
                  query: { params: [A] }
                  reducer: { type: last, params: [] }
        noDataState: NoData
        execErrState: Error
        for: 5m
        annotations:
          summary: "High P95 latency on backend_proxy"
          description: "P95 request latency has exceeded 3 seconds for 5 minutes."
        labels:
          severity: warning

      - uid: nexus-high-error-rate
        title: "High HTTP Error Rate"
        condition: B
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus-nexus
            model:
              expr: '100 * sum(rate(http_requests_total{job="backend_proxy", status_code=~"5.."}[5m])) / sum(rate(http_requests_total{job="backend_proxy"}[5m]))'
              refId: A
          - refId: B
            datasourceUid: "-100"
            model:
              type: classic_conditions
              refId: B
              conditions:
                - type: query
                  evaluator: { type: gt, params: [10] }
                  operator: { type: and }
                  query: { params: [A] }
                  reducer: { type: last, params: [] }
        noDataState: NoData
        execErrState: Error
        for: 2m
        annotations:
          summary: "High HTTP 5xx error rate"
          description: "More than 10% of requests are returning 5xx errors for 2 minutes."
        labels:
          severity: critical
