apiVersion: 1

datasources:
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: true
    version: 1
    editable: true
    jsonData:
      maxLines: 1000
      derivedFields:
        - name: CorrelationID
          matcherRegex: '"correlation_id":"([^"]+)"'
          url: ""
